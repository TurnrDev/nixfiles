keys:
  - &jay_framework age1atpm74cfa3dxtcecq55r7yavsg4ejg4y2eh4zmk858ws3wshfa8sewvq5x
  - &jay_desktop age1enf6jx4p707scf9p6htadcqg9lqpu96ug0h0dqacdge6aph5ua0qpcmj5q
  # Add additional machine keys here, for example:
  # - &jay_pc age1...

creation_rules:
  - path_regex: (^|.*/)shared\.yaml$
    key_groups:
      - age:
          - *jay_framework
          - *jay_desktop
          # - *jay_pc

  - path_regex: (^|.*/)hosts/jay-framework\.yaml$
    key_groups:
      - age:
          - *jay_framework

  - path_regex: (^|.*/)hosts/jay-desktop\.yaml$
    key_groups:
      - age:
          - *jay_desktop

  # Host-specific secrets can differ per machine while reusing the same keys.
  # Example:
  # - path_regex: (^|.*/)hosts/jay-pc\.yaml$
  #   key_groups:
  #     - age:
  #         - *jay_pc
